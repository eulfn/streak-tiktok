name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'src/Feener/Feener.csproj'

jobs:
  build-android:
    permissions: write-all
    runs-on: windows-latest
    
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Decode Keystore
      run: |
        $keystoreBytes = [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}")
        [IO.File]::WriteAllBytes("src/Feener/feener.keystore", $keystoreBytes)
        Write-Host "Keystore file created successfully"
      shell: pwsh

    - name: Validate signing configuration
      run: |
        if (-not (Test-Path "src/Feener/feener.keystore")) {
          Write-Error "feener.keystore was not created. Check ANDROID_KEYSTORE_BASE64 secret."
          exit 1
        }
        $size = (Get-Item "src/Feener/feener.keystore").Length
        if ($size -lt 100) {
          Write-Error "feener.keystore is too small ($size bytes). Secret may be empty or corrupt."
          exit 1
        }
        if ([string]::IsNullOrEmpty("$env:SIGNING_PASSWORD_CHECK")) {
          Write-Error "ANDROID_SIGNING_PASSWORD is not set. Cannot sign the APK."
          exit 1
        }
        Write-Host "Signing configuration validated: keystore=$size bytes, password=set"
      shell: pwsh
      env:
        SIGNING_PASSWORD_CHECK: ${{ secrets.ANDROID_SIGNING_PASSWORD }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Install MAUI workload
      run: dotnet workload install maui-android

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Get version from tag
      id: get_version
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
        } else {
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        }
      shell: pwsh

    - name: Build Android Release
      run: |
        $ver = "${{ steps.get_version.outputs.VERSION }}"
        $parts = $ver -split '\.'
        $vc = [int]$parts[0] * 10000 + [int]$parts[1] * 100 + [int]$parts[2]
        Write-Host "Building with ApplicationVersion=$vc ApplicationDisplayVersion=$ver"
        dotnet publish ${{ env.PROJECT_PATH }} -f net9.0-android -c Release -o ./artifacts -p:ApplicationVersion=$vc -p:ApplicationDisplayVersion=$ver
      shell: pwsh
      env:
        ANDROID_SIGNING_PASSWORD: ${{ secrets.ANDROID_SIGNING_PASSWORD }}

    - name: Rename APK
      run: |
        $newName = "Feener-v${{ steps.get_version.outputs.VERSION }}.apk"
        # Prefer explicitly signed variant if MAUI produced both signed and unsigned
        $apk = Get-ChildItem -Path ./artifacts -Filter "*-Signed.apk" | Select-Object -First 1
        if (-not $apk) {
          $apk = Get-ChildItem -Path ./artifacts -Filter "*.apk" | Select-Object -First 1
        }
        if ($apk) {
          Rename-Item -Path $apk.FullName -NewName $newName
          echo "APK_NAME=$newName" >> $env:GITHUB_OUTPUT
          echo "APK_PATH=./artifacts/$newName" >> $env:GITHUB_OUTPUT
          # Delete all other APKs so only Feener-vX.X.X.apk gets uploaded
          Get-ChildItem -Path ./artifacts -Filter "*.apk" |
            Where-Object { $_.Name -ne $newName } |
            Remove-Item -Force
          Write-Host "Published APK: $newName"
        }
      shell: pwsh
      id: rename_apk

    - name: APK Identity Report
      run: |
        $ErrorActionPreference = 'SilentlyContinue'
        $apk = Get-ChildItem -Path ./artifacts -Filter "*.apk" | Select-Object -First 1
        if (-not $apk) { Write-Host "No APK found in ./artifacts"; exit 0 }
        $apkPath = $apk.FullName

        # Locate aapt bundled with the Android SDK
        $sdkRoot = "$env:ANDROID_SDK_ROOT"
        $aapt = Get-ChildItem "$sdkRoot\build-tools" -Recurse -Filter "aapt.exe" |
                Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName

        Write-Host "========================================"
        Write-Host "  APK IDENTITY REPORT"
        Write-Host "========================================"

        if ($aapt) {
          $badging = & $aapt dump badging $apkPath 2>&1
          $packageLine = ($badging | Where-Object { $_ -match "^package:" }) | Select-Object -First 1
          if ($packageLine) {
            $pkgName = if ($packageLine -match "name='([^']+)'")  { $Matches[1] } else { "?" }
            $verCode = if ($packageLine -match "versionCode='([^']+)'") { $Matches[1] } else { "?" }
            $verName = if ($packageLine -match "versionName='([^']+)'") { $Matches[1] } else { "?" }
            Write-Host "PackageName  = $pkgName"
            Write-Host "VersionName  = $verName"
            Write-Host "VersionCode  = $verCode"
          }
        } else {
          Write-Host "aapt not found — skipping badging dump"
        }

        # Extract signing SHA-256 fingerprint via apksigner
        $apkSigner = Get-ChildItem "$sdkRoot\build-tools" -Recurse -Filter "apksigner.bat" |
                     Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
        if ($apkSigner) {
          $sigInfo = & $apkSigner verify --print-certs $apkPath 2>&1
          $sha256Line = ($sigInfo | Where-Object { $_ -match "SHA-256" }) | Select-Object -First 1
          Write-Host "Signature SHA-256 = $sha256Line"
        } else {
          Write-Host "apksigner not found — skipping cert fingerprint"
        }

        Write-Host "----------------------------------------"
        Write-Host "Project ApplicationId  = com.fen.loid"
        Write-Host "Tag Version = ${{ steps.get_version.outputs.VERSION }}"
        Write-Host "========================================"
      shell: pwsh
      id: apk_identity
      continue-on-error: true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: ./artifacts/*.apk
        retention-days: 30

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
        name: Feener v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Feener v${{ steps.get_version.outputs.VERSION }}
          
          ### Installation
          1. Download the APK file below
          2. Enable "Install from unknown sources" on your Android device
          3. Install the APK
          
          ### Features
          - Automatic TikTok streak messages every 23 hours
          - Configurable friend list
          - Background service with reliable scheduling
          
          ### Requirements
          - Android 7.0 (API 24) or higher
        files: ./artifacts/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

